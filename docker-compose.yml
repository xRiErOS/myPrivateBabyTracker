services:
  mybaby:
    build: .
    container_name: mybaby
    restart: unless-stopped
    ports:
      - "8080:8000"
    volumes:
      - ./data:/app/data
    environment:
      - SECRET_KEY=${SECRET_KEY}
      - AUTH_MODE=${AUTH_MODE:-forward}
      - AUTH_TRUSTED_HEADER=${AUTH_TRUSTED_HEADER:-Remote-User}
      - AUTH_TRUSTED_PROXIES=${AUTH_TRUSTED_PROXIES:-192.168.178.0/24}
      - DATABASE_URL=${DATABASE_URL:-sqlite:////app/data/mybaby.db}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - ENVIRONMENT=${ENVIRONMENT:-prod}
      - CORS_ORIGINS=${CORS_ORIGINS:-}
    stop_grace_period: 15s
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - nginx-proxy_default

networks:
  nginx-proxy_default:
    external: true

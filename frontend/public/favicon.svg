<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background circle — Catppuccin Latte Peach -->
  <circle cx="50" cy="50" r="50" fill="#fe640b"/>
  <!-- Baby bottle silhouette — white -->
  <!-- Bottle body -->
  <rect x="38" y="42" width="24" height="34" rx="8" ry="8" fill="white"/>
  <!-- Bottle neck -->
  <rect x="42" y="30" width="16" height="14" rx="4" ry="4" fill="white"/>
  <!-- Bottle cap / nipple -->

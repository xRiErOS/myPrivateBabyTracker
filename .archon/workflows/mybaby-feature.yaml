name: mybaby-feature
description: "Feature implementieren: TDD → Tests → Review + AI-Test → Telegram → Approval → Push"
interactive: true

nodes:
  - id: load-context
    command: load-sprint-context

  - id: code
    command: coding-lead
    depends_on: [load-context]

  - id: run-tests
    bash: |
      set -e
      cd backend && python -m pytest -q
      cd ../frontend && npm run test -- --run
    depends_on: [code]

  - id: review
    command: code-reviewer
    denied_tools: [Write, Edit, MultiEdit]
    depends_on: [run-tests]

  - id: ai-test
    command: tester
    denied_tools: [Write, Edit, MultiEdit]
    depends_on: [run-tests]

  - id: capture-findings
    bash: |
      bash /Users/erik/Obsidian/tools/myPrivateBabyTracker/.archon/snippets/capture-findings.sh
    depends_on: [review, ai-test]

  - id: notify
    bash: |
      TOKEN=$(grep CLAUDE_TELEGRAM_BOT_API \
        "/Users/erik/Obsidian/Vault/400 AI Agent/430 Claude-Telegram-Bot/claude-telegram-bot.env" \
        | cut -d'=' -f2 | tr -d '"')
      RID="${RUN_ID:-unknown}"
      MSG="MyBaby%20mybaby-feature%20bereit.%0AApprove%3A%20archon%20workflow%20approve%20${RID}"
      curl -fsS "https://api.telegram.org/bot${TOKEN}/sendMessage" \
        -d "chat_id=96239239&text=${MSG}" > /dev/null || echo "Telegram-Notify übersprungen"
    depends_on: [capture-findings]

  - id: gate
    approval:
      message: "Review und Tests abgeschlossen. Telegram-Benachrichtigung gesendet. Änderungen pushen?"
      on_reject:
        prompt: "Überarbeite die Implementierung basierend auf diesem Feedback: $REJECTION_REASON"
    depends_on: [notify]

  - id: push
    bash: |
      set -e
      if grep -q '100\.71\.39\.53' frontend/vite.config.ts; then
        echo "FEHLER: NAS-IP in vite.config.ts — Proxy auf localhost zurücksetzen!"
        exit 1
      fi
      git push
    depends_on: [gate]

  - id: snapshot
    command: save-session-snapshot
    depends_on: [push]

  - id: done-notify
    depends_on: [snapshot]
    bash: |
      TOKEN=$(grep CLAUDE_TELEGRAM_BOT_API \
        "/Users/erik/Obsidian/Vault/400 AI Agent/430 Claude-Telegram-Bot/claude-telegram-bot.env" \
        | cut -d'=' -f2 | tr -d '"')
      RID="${RUN_ID:-unknown}"
      MSG="MyBaby%20Feature%20DURCH%20%E2%9C%85%0APush%20OK%20%E2%80%94%20Run%3A%20${RID}"
      curl -fsS "https://api.telegram.org/bot${TOKEN}/sendMessage" \
        -d "chat_id=96239239&text=${MSG}" > /dev/null || echo "Done-Notify übersprungen"
